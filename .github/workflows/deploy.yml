name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bdoom-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to OCI
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30

    steps:
      - name: Deploy locally
        run: |
          set -euo pipefail
          cd /opt/bdoom/repo
          git pull --ff-only
          ./deploy/deploy.sh

      - name: Verify production
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --head https://bdoom.duckdns.org/
          curl --fail --show-error --silent https://bdoom.duckdns.org/api/health
